<!DOCTYPE html>
<html>
<head>
  <title>Smart Badge</title>
</head>
<body>
  <h1>Smart Badge</h1>
  <button onclick="connectBLE()">Connect to Badge</button>
  <button onclick="startMicMonitor()">Start Decibel Monitor</button>
  <button onclick="stopMicMonitor()">Stop Decibel Monitor</button>
  <button onclick="navigator.vibrate(2000)">Test Vibrate 2 sec</button>

  <p>Current dB: <span id="dbDisplay">--</span></p>   
  <p>Status: <span id="status">--</span></p>      

  <p>Threshold: <input type="range" min="50" max="90" value="70"
    oninput="DB_THRESHOLD = +this.value; document.getElementById('dbval').textContent = this.value">
    <span id="dbval">70</span> dB</p>

  <script src="badge-connect.js"></script>
</body>
</html>
